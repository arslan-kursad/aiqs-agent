# PatchCore baseline for the CPU-only Intel-mac host.
#
# PatchCore builds a coreset memory bank in a SINGLE PASS over training data
# (no 70k-step grind like EfficientAD). On this host that means ~2-5 min total
# training vs hours. It's also typically stronger at image-level separation
# (what the Phase-1 decision layer needs). Inference speed is slower than
# EfficientAD, but irrelevant for a demo / eval pipeline.
#
# Backbone is WideResNet-50-2 (torchvision ships pretrained weights, no
# separate download).
#
# CPU-tuning (measured the hard way): coreset_sampling_ratio=0.1 + batch 32 with the
# WRN50-2 patch dim (~1536) on this 2-core/limited-RAM host THRASHED — the greedy
# k-center coreset over ~410k patches stalled for hours with no progress. Dropped to
# coreset 0.01 (the PatchCore paper shows 1% coreset ≈ full-memory-bank accuracy) and
# batch 8 (lower RAM peak). This trains in minutes and keeps image-level separation.

seed: 42
category: capsule  # manually corrected 2026-07-07 -- config.yaml originally persisted the un-overridden --config default (root cause: https://github.com/arslan-kursad/anomaly-adjudicator/issues/3)

dataset:
  name: mvtec
  root: datasets/mvtec
  image_size: [256, 256]
  train_batch_size: 8        # smaller = lower RAM peak during feature extraction
  eval_batch_size: 8
  num_workers: 0

model:
  name: patchcore
  backbone: wide_resnet50_2
  layers: [layer2, layer3]
  coreset_sampling_ratio: 0.01   # 1% coreset ≈ full accuracy (PatchCore paper); CPU-cheap
  num_neighbors: 9

training:
  max_steps: -1              # PatchCore ignores max_steps; trains 1 epoch
  accelerator: auto          # cpu on this Intel host
  devices: 1

output:
  models_dir: models
  results_dir: results
